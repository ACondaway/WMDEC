model:
  unet_name: "stabilityai/stable-diffusion-xl-base-1.0"
  qwen_encoder_ckpt: "/share/project/congsheng/qwen_visual/qwen3_5_visual_encoder_4b.pt"
  qwen_dim: 2560           # out_hidden_size of Qwen3.5-VL-4B projected ViT output (ViT hidden=1024, projected=2560)
  cross_attn_dim: 2048
  pooled_proj_dim: 1280
  num_img_tokens: 16
  num_heads: 8

diffusion:
  num_timesteps: 1000
  beta_start: 0.00085
  beta_end: 0.012
  schedule: "scaled_linear"

training:
  batch_size_per_gpu: 1
  max_steps: 300000
  lr: 5.0e-5
  weight_decay: 0.01
  grad_clip: 1.0
  gradient_checkpointing: true
  cfg_drop_prob: 0.10
  lambda_sem: 0.1
  sem_loss_every: 10
  log_every: 100
  plot_every: 100
  save_every: 10000
  visualize_every: 1000
  output_dir: "/share/project/congsheng/WMDEC/v3_sdxl_checkpoints"

data:
  resolution: 1024
  num_workers: 4
  # Rebalancing: alpha=1.0 → proportional, alpha=0.0 → equal per dataset, 0.7 recommended
  rebalance_alpha: 0.7
  # num_samples_per_epoch: null means use total dataset size
  num_samples_per_epoch: null

  datasets:
    - name: "robobrain-dex"
      embedding_dir: "/share/project/congsheng/WMDEC_qwen/robobrain-dex-qwen-embedding/robobrain-dex"
      image_dir: "/share/project/hotel/lerobot30_multiimage_data_1fps/robobrain-dex"
    # Add more datasets below. Each needs a registered preprocessor in
    # data/preprocessors/__init__.py
    # - name: "my_new_dataset"
    #   embedding_dir: "/share/project/congsheng/my-new-dataset-qwen-embedding"
    #   image_dir: "/share/.../my_new_dataset"

validation:
  val_every: 5000            # fast val (loss + cosine sim) every N steps
  val_full_every: 20000      # full DDIM val every N steps (0 = disabled)
  val_num_samples: 200       # samples used when no val_datasets provided
  val_batch_size: 4
  val_ddim_steps: 20         # DDIM steps for full val (faster than inference)
  val_cfg_scale: 2.0
  val_full_max_batches: 4    # number of batches to generate in full val
  best_metric: "val/cosine_sim"   # metric used to save best.pt (higher=better)

  # Optional: separate held-out val datasets.
  # If omitted, a fixed random subset of training data is used.
  # val_datasets:
  #   - name: "robobrain-dex"
  #     embedding_dir: "/share/project/congsheng/robobrain-dex-qwen-embedding-val"
  #     image_dir: "/share/.../robobrain-dex-val"

inference:
  num_steps: 50
  cfg_scale: 2.0
