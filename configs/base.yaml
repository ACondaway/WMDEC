model:
  # backbone: "sdxl"  — ε-prediction, cross_attn_dim=2048, pooled_proj_dim=1280, ~2.6B params
  # backbone: "sd21"  — v-prediction, cross_attn_dim=1024, no pooled_proj_dim,   ~865M params
  backbone: "sd21"
  unet_name: "stabilityai/stable-diffusion-2-1-base"
  qwen_encoder_ckpt: "/share/project/congsheng/qwen_visual/qwen3_5_visual_encoder_4b.pt"
  qwen_dim: 2560           # Qwen3.5-4B visual output dim (2560)
  cross_attn_dim: 1024     # SD 2.1-base UNet cross-attention dim (use 2048 for sdxl)
  # pooled_proj_dim: 1280  # SDXL only — omit or comment out for sd21
  num_img_tokens: 16
  num_heads: 8

diffusion:
  num_timesteps: 1000
  beta_start: 0.00085
  beta_end: 0.012
  schedule: "scaled_linear"

training:
  # "full": train all UNet weights + ImageAdapter
  # "lora": freeze UNet base, train only LoRA deltas + ImageAdapter (requires peft)
  training_mode: "full"
  lora_rank: 64
  lora_alpha: 64
  # lora_target_modules: null  # null = default ["to_q","to_k","to_v","to_out.0","to_add_out"]

  batch_size_per_gpu: 32    # 56×56 latent fits ~32-48 per H100 in full training
  max_steps: 300000
  lr: 5.0e-5
  weight_decay: 0.01
  grad_clip: 1.0
  gradient_checkpointing: true
  cfg_drop_prob: 0.10
  lambda_sem: 0.1
  sem_loss_every: 10
  log_every: 100
  plot_every: 100
  save_every: 10000
  visualize_every: 1000
  save_loss_history: false   # true = persist loss_history in checkpoints for seamless resume curves
  output_dir: "/share/project/congsheng/WMDEC/v4_sd21_checkpoints"

data:
  resolution: 448
  num_workers: 4
  # Rebalancing: alpha=1.0 → proportional, alpha=0.0 → equal per dataset, 0.7 recommended
  rebalance_alpha: 0.7
  # num_samples_per_epoch: null means use total dataset size
  num_samples_per_epoch: null

  datasets:
    - name: "robobrain-dex"
      embedding_dir: "/share/project/congsheng/WMDEC_qwen/robobrain-dex-qwen-embedding/robobrain-dex"
      image_dir: "/share/project/hotel/lerobot30_multiimage_data_1fps/robobrain-dex"
    # Add more datasets below. Each needs a registered preprocessor in
    # data/preprocessors/__init__.py
    # - name: "my_new_dataset"
    #   embedding_dir: "/share/project/congsheng/my-new-dataset-qwen-embedding"
    #   image_dir: "/share/.../my_new_dataset"

validation:
  val_every: 5000            # fast val (loss + cosine sim) every N steps
  val_full_every: 20000      # full DDIM val every N steps (0 = disabled)
  val_num_samples: 200       # samples used when no val_datasets provided
  val_batch_size: 4
  val_ddim_steps: 20         # DDIM steps for full val (faster than inference)
  val_cfg_scale: 2.0
  val_full_max_batches: 4    # number of batches to generate in full val
  best_metric: "val/cosine_sim"   # metric used to save best.pt (higher=better)

  # Optional: separate held-out val datasets.
  # If omitted, a fixed random subset of training data is used.
  # val_datasets:
  #   - name: "robobrain-dex"
  #     embedding_dir: "/share/project/congsheng/robobrain-dex-qwen-embedding-val"
  #     image_dir: "/share/.../robobrain-dex-val"

inference:
  num_steps: 50
  cfg_scale: 2.0
