model:
  siglip_model: "google/siglip-large-patch16-384"
  siglip_dim: 1152
  t5_dim: 4096
  cross_attn_dim: 1024
  num_img_tokens: 8
  adapter_layers: 3
  model_channels: 256
  channel_mult: [1, 2, 4, 4]
  num_heads: 8
  vae_name: "stabilityai/sd-vae-ft-mse"

diffusion:
  num_timesteps: 1000
  beta_start: 0.00085
  beta_end: 0.012
  schedule: "scaled_linear"

training:
  batch_size_per_gpu: 8
  max_steps: 200000
  lr: 1.0e-4
  weight_decay: 0.01
  grad_clip: 1.0
  lambda_sem: 0.1
  sem_loss_every: 10
  log_every: 100
  save_every: 10000
  output_dir: "outputs"

data:
  embedding_dir: "/share/project/congsheng/robobrain-dex-siglip-embedding"
  image_dir: "/share/project/hotel/lerobot30_multiimage_data_1fps/robobrain-dex"
  resolution: 256
  num_workers: 4

inference:
  num_steps: 50
  cfg_scale_img: 2.0
  cfg_scale_txt: 1.0
